<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universe Data Booklet</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts for a sci-fi look -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌌 Universe Data Booklet</h1>
            <p>Exploring Asteroids & Exoplanets</p>
        </header>

        <main>
            <!-- Section 1: Data Overview -->
            <section id="data-overview">
                <h2>Dataset Summary</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Asteroids</h3>
                        <p id="asteroid-count">Loading...</p>
                    </div>
                    <div class="stat-card">
                        <h3>Exoplanets</h3>
                        <p id="exoplanet-count">Loading...</p>
                    </div>
                </div>
            </section>

            <!-- Section 2: Habitability Checker -->
            <section id="habitability-checker">
                <h2>🔍 Habitability Analyzer</h2>
                <div class="input-group">
                    <input type="text" id="planet-input" placeholder="Enter Planet Name (e.g., Kepler-186f)">
                    <button onclick="checkHabitability()">Analyze</button>
                </div>
                <div id="result-display" class="hidden">
                    <div class="result-card">
                        <h3 id="result-name"></h3>
                        <p id="result-status"></p>
                        <div class="water-badge" id="water-badge">--</div>
                        <p id="result-note" class="small-text"></p>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>Data Sources: NASA JPL, NASA Exoplanet Archive | Privacy: Local Processing Only</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
